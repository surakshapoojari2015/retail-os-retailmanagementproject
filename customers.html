<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ROS — Customers</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
  <link href="layout.css" rel="stylesheet"/>
  <style>
    .cust-avatar {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif; font-weight: 700;
      font-size: 0.8rem; color: #fff; flex-shrink: 0;
    }
    .action-btn { background:none;border:none;cursor:pointer;padding:5px 9px;border-radius:7px;font-size:0.85rem;transition:all 0.15s; }
    .action-btn.edit { color:var(--accent2); } .action-btn.edit:hover { background:#fef3c7; }
    .action-btn.del  { color:#ef4444; }       .action-btn.del:hover  { background:#fee2e2; }
    .action-btn.view { color:var(--accent3); } .action-btn.view:hover { background:#d1fae5; }
    .filter-bar { background:#fff;border:1.5px solid var(--border);border-radius:12px;padding:1rem 1.5rem;display:flex;align-items:center;gap:1rem;flex-wrap:wrap;margin-bottom:1.5rem; }
    .filter-bar .form-select { border-radius:8px;font-size:0.85rem;padding:0.42rem 0.8rem;max-width:200px; }
  </style>
</head>
<body>
  <div class="main-wrapper">
    <div class="page-content">
      <div class="page-header d-flex align-items-start justify-content-between">
        <div><h2>Customers</h2><p>Manage your customer relationships</p></div>
        <button class="btn-primary-custom" data-bs-toggle="modal" data-bs-target="#custModal" onclick="openAdd()">
          <i class="fa fa-user-plus"></i> Add Customer
        </button>
      </div>

      <div class="row g-3 mb-4">
        <div class="col"><div class="stat-card" style="padding:1rem 1.25rem;"><div class="label">Total Customers</div><div class="value" style="font-size:1.5rem">3,920</div></div></div>
        <div class="col"><div class="stat-card" style="padding:1rem 1.25rem;"><div class="label">Active</div><div class="value" style="font-size:1.5rem;color:var(--accent3)">3,410</div></div></div>
        <div class="col"><div class="stat-card" style="padding:1rem 1.25rem;"><div class="label">New This Month</div><div class="value" style="font-size:1.5rem;color:var(--accent2)">148</div></div></div>
        <div class="col"><div class="stat-card" style="padding:1rem 1.25rem;"><div class="label">VIP Members</div><div class="value" style="font-size:1.5rem;color:var(--accent)">62</div></div></div>
      </div>

      <div class="filter-bar">
        <div class="topbar-search" style="max-width:280px;">
          <i class="fa fa-search search-icon"></i>
          <input type="text" placeholder="Search customers…" id="searchInput" oninput="filterTable()"/>
        </div>
        <select class="form-select" id="statusFilter" onchange="filterTable()">
          <option value="">All Status</option>
          <option>Active</option><option>Inactive</option>
        </select>
        <div class="ms-auto"><button class="btn-ghost"><i class="fa fa-file-export me-1"></i>Export</button></div>
      </div>

      <div class="card">
        <div style="overflow-x:auto">
          <table class="table-custom">
            <thead>
              <tr>
                <th><input type="checkbox" style="accent-color:var(--accent)"/></th>
                <th>Customer</th><th>Email</th><th>Phone</th>
                <th>City</th><th>Orders</th><th>Total Spent</th><th>Status</th><th>Actions</th>
              </tr>
            </thead>
            <tbody id="custBody"></tbody>
          </table>
        </div>
        <div style="padding:1rem 1.5rem;display:flex;align-items:center;justify-content:space-between;border-top:1.5px solid var(--border);">
          <span style="font-size:0.82rem;color:var(--muted)">Showing <span id="showCount">0</span> of <span id="totalCount">0</span></span>
          <nav><ul class="pagination mb-0">
            <li class="page-item disabled"><a class="page-link">&laquo;</a></li>
            <li class="page-item active"><a class="page-link">1</a></li>
            <li class="page-item"><a class="page-link">2</a></li>
            <li class="page-item"><a class="page-link">&raquo;</a></li>
          </ul></nav>
        </div>
      </div>
    </div>
  </div>

  <!-- Add/Edit Modal -->
  <div class="modal fade" id="custModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle">Add Customer</h5>
          <button class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="row g-3">
            <div class="col-md-6"><label class="form-label">First Name</label><input class="form-control" id="cFirst" placeholder="Priya"/></div>
            <div class="col-md-6"><label class="form-label">Last Name</label><input class="form-control" id="cLast" placeholder="Sharma"/></div>
            <div class="col-md-6"><label class="form-label">Email</label><input class="form-control" id="cEmail" type="email" placeholder="priya@email.com"/></div>
            <div class="col-md-6"><label class="form-label">Phone</label><input class="form-control" id="cPhone" placeholder="+91 98765 43210"/></div>
            <div class="col-md-6"><label class="form-label">City</label><input class="form-control" id="cCity" placeholder="Bengaluru"/></div>
            <div class="col-md-6"><label class="form-label">Status</label>
              <select class="form-select" id="cStatus"><option>Active</option><option>Inactive</option></select>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn-ghost" data-bs-dismiss="modal">Cancel</button>
          <button class="btn-primary-custom" onclick="saveCustomer()"><i class="fa fa-save"></i> Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Delete Modal -->
  <div class="modal fade" id="delModal" tabindex="-1">
    <div class="modal-dialog modal-sm">
      <div class="modal-content">
        <div class="modal-header"><h5 class="modal-title">Confirm Delete</h5><button class="btn-close" data-bs-dismiss="modal"></button></div>
        <div class="modal-body"><p style="font-size:0.9rem">Delete <strong id="delName"></strong>?</p></div>
        <div class="modal-footer">
          <button class="btn-ghost" data-bs-dismiss="modal">Cancel</button>
          <button class="btn-primary-custom" style="background:#ef4444" onclick="confirmDel()"><i class="fa fa-trash"></i> Delete</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js"></script>
  <script src="layout.js"></script>
  <script>
    renderLayout('Customers');

    const avatarColors = ['#7c3aed','#a78bfa','#10b981','#f59e0b','#06b6d4','#8b5cf6','#6d28d9','#4f46e5'];
    let customers = [
      {id:1,first:'Priya',   last:'Sharma',   email:'priya.s@gmail.com',   phone:'+91 98765 43210',city:'Bengaluru', orders:12,spent:38500, status:'Active'},
      {id:2,first:'Arjun',   last:'Mehta',    email:'arjun.m@yahoo.com',   phone:'+91 91234 56789',city:'Mumbai',    orders:8, spent:24200, status:'Active'},
      {id:3,first:'Kavitha', last:'Rao',      email:'kavitha.r@gmail.com', phone:'+91 87654 32101',city:'Hyderabad', orders:3, spent:7800,  status:'Active'},
      {id:4,first:'Ravi',    last:'Kumar',    email:'ravi.k@hotmail.com',  phone:'+91 99887 76655',city:'Chennai',   orders:1, spent:2400,  status:'Inactive'},
      {id:5,first:'Sneha',   last:'Patel',    email:'sneha.p@gmail.com',   phone:'+91 80001 23456',city:'Ahmedabad', orders:21,spent:67800, status:'Active'},
      {id:6,first:'Mohammed',last:'Ali',      email:'mo.ali@gmail.com',    phone:'+91 77889 90011',city:'Delhi',     orders:5, spent:14500, status:'Active'},
      {id:7,first:'Anjali',  last:'Singh',    email:'anjali.s@gmail.com',  phone:'+91 96543 21098',city:'Jaipur',    orders:7, spent:19200, status:'Active'},
      {id:8,first:'Deepak',  last:'Nair',     email:'deepak.n@gmail.com',  phone:'+91 88776 54321',city:'Kochi',     orders:0, spent:0,     status:'Inactive'},
      {id:9,first:'Meera',   last:'Krishnan', email:'meera.k@gmail.com',   phone:'+91 93456 78901',city:'Mangaluru', orders:15,spent:45200, status:'Active'},
      {id:10,first:'Suresh', last:'Reddy',    email:'suresh.r@gmail.com',  phone:'+91 70012 34567',city:'Vizag',     orders:4, spent:11300, status:'Active'},
    ];
    let editId = null, deleteId = null;

    function initials(f, l) { return (f[0] + l[0]).toUpperCase(); }
    function color(i)        { return avatarColors[i % avatarColors.length]; }

    function renderTable(data) {
      document.getElementById('custBody').innerHTML = data.map(c => `
        <tr>
          <td><input type="checkbox" style="accent-color:var(--accent)"/></td>
          <td>
            <div class="d-flex align-items-center gap-3">
              <div class="cust-avatar" style="background:${color(c.id)}">${initials(c.first,c.last)}</div>
              <div>
                <div style="font-weight:600;font-size:0.88rem">${c.first} ${c.last}</div>
                <div style="font-size:0.7rem;color:var(--muted)">CID-${String(c.id).padStart(4,'0')}</div>
              </div>
            </div>
          </td>
          <td style="font-size:0.84rem">${c.email}</td>
          <td style="font-size:0.84rem">${c.phone}</td>
          <td style="font-size:0.84rem">${c.city}</td>
          <td style="font-family:'Syne',sans-serif;font-weight:700">${c.orders}</td>
          <td style="font-family:'Syne',sans-serif;font-weight:700;color:var(--accent)">₹${c.spent.toLocaleString('en-IN')}</td>
          <td><span class="badge-status ${c.status==='Active'?'badge-active':'badge-inactive'}">${c.status}</span></td>
          <td>
            <button class="action-btn view" onclick="viewCustomer(${c.id})"><i class="fa fa-eye"></i></button>
            <button class="action-btn edit" onclick="editCustomer(${c.id})"><i class="fa fa-pen"></i></button>
            <button class="action-btn del"  onclick="deleteCustomer(${c.id},'${c.first} ${c.last}')"><i class="fa fa-trash"></i></button>
          </td>
        </tr>`).join('');
      document.getElementById('showCount').textContent = data.length;
      document.getElementById('totalCount').textContent = customers.length;
    }

    function filterTable() {
      const q  = document.getElementById('searchInput').value.toLowerCase();
      const st = document.getElementById('statusFilter').value;
      renderTable(customers.filter(c =>
        (!q  || (c.first+' '+c.last+c.email+c.city).toLowerCase().includes(q)) &&
        (!st || c.status === st)
      ));
    }

    function openAdd() {
      editId = null;
      document.getElementById('modalTitle').textContent = 'Add Customer';
      ['cFirst','cLast','cEmail','cPhone','cCity'].forEach(i => document.getElementById(i).value = '');
    }

    function editCustomer(id) {
      const c = customers.find(x => x.id === id);
      editId = id;
      document.getElementById('modalTitle').textContent = 'Edit Customer';
      document.getElementById('cFirst').value  = c.first;
      document.getElementById('cLast').value   = c.last;
      document.getElementById('cEmail').value  = c.email;
      document.getElementById('cPhone').value  = c.phone;
      document.getElementById('cCity').value   = c.city;
      document.getElementById('cStatus').value = c.status;
      new bootstrap.Modal(document.getElementById('custModal')).show();
    }

    function saveCustomer() {
      const first = document.getElementById('cFirst').value.trim();
      if (!first) { alert('First name required'); return; }
      const data = { first, last:document.getElementById('cLast').value, email:document.getElementById('cEmail').value, phone:document.getElementById('cPhone').value, city:document.getElementById('cCity').value, status:document.getElementById('cStatus').value };
      if (editId) { const idx = customers.findIndex(c => c.id === editId); customers[idx] = {...customers[idx],...data}; }
      else customers.push({id:customers.length+1,orders:0,spent:0,...data});
      bootstrap.Modal.getInstance(document.getElementById('custModal')).hide();
      filterTable();
    }

    function deleteCustomer(id, name) { deleteId=id; document.getElementById('delName').textContent=name; new bootstrap.Modal(document.getElementById('delModal')).show(); }
    function confirmDel() { customers = customers.filter(c=>c.id!==deleteId); bootstrap.Modal.getInstance(document.getElementById('delModal')).hide(); filterTable(); }

    function viewCustomer(id) {
      const c = customers.find(x => x.id === id);
      alert(`👤 ${c.first} ${c.last}\n\nEmail: ${c.email}\nPhone: ${c.phone}\nCity: ${c.city}\nOrders: ${c.orders}\nTotal Spent: ₹${c.spent.toLocaleString('en-IN')}\nStatus: ${c.status}`);
    }

    renderTable(customers);
  </script>
</body>
</html>
